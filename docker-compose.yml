version: '3.6'
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - minio
    env_file:
      - .env
    environment:
      DB_DATASOURCE_USER: postgres
      DB_DATASOURCE_PASSWORD: postgres
      DB_DATASOURCE_URL: jdbc:postgresql://localhost:5432/postgres
    networks:
      - cloud-file
    ports:
      - "8080:8080"

  postgres:
    image: postgres:17.5
    restart: always
    container_name: postgres-container
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cloud-file

  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - cloud-file

volumes:
  pgdata: { }

networks:
  cloud-file:
    driver: bridge
    name: cloud-file

